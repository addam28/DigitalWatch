<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
        body{
            height: 100vh;
            background-color: lightgrey;
            display: flex;
            justify-content: center;
            align-items: center; 
        }       
        .baap{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .mainDiv{
            height: 130px;
            width: 330px;
            border:  1px solid black;  
           background-color: lightcyan;
        }
    </style>
</head>
<body>
   
    
    <div class="baap">
        <div class="head">
        <h1 class="sun">Digital Watch</h1>
        </div>
       
        <div class="mainDiv" style="height: 100%;">
            <p id="clock"></p>
       
    </div>
    </div>
    <script>
        let clock=document.getElementById("clock");
        let main=document.querySelector(".mainDiv");
        const currTime=()=>{
            let currTimee=new Date().toLocaleTimeString();
            clock.innerText=currTimee;
        }
        setInterval(()=>{
            currTime();

        },1000)
        clock.style.fontSize="50px";
        // clock.style.marginLeft="29px";
        main.style.display="flex";
        main.style.justifyContent="center";
        main.style.alignItems="center";

    </script>
</body>
</html>
